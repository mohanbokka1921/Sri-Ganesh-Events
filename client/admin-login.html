<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora Events Admin Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Poppins,sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #ff758c,
                #ff7eb3
            );
        }

        .login-box{

            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:
            0 10px 30px rgba(0,0,0,0.2);

        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
        }

        .input-group input{

            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:16px;

        }

        button{

            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#ff4f81;
            color:white;
            font-size:18px;
            cursor:pointer;

        }

        button:hover{

            background:#e63f72;

        }

        #message{

            margin-top:15px;
            text-align:center;
            color:red;

        }

    </style>

</head>
<body>

    <div class="login-box">

        <h1>Admin Login</h1>

        <form id="loginForm">

            <div class="input-group">

                <label>
                    Username
                </label>

                <input
                type="text"
                id="username"
                required>

            </div>

            <div class="input-group">

                <label>
                    Password
                </label>

                <input
                type="password"
                id="password"
                required>

            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <p id="message"></p>

    </div>

    <script src="js/admin-login.js"></script>

</body>
</html>
